<form action="send_email.php" method="post">

    <label for="name">Ditt namn:</label>
    <input type="text" id="name" name="name" required>

    <label for="phone">Telefonnummer:</label>
    <input type="text" id="phone" name="phone" required>

    <label for="email">E-postadress:</label>
    <input type="email" id="email" name="email" required>

    <label for="address">Adress:</label>
    <input type="text" id="address" name="address" required>

    <label>Välj tjänst:</label>

    <div class="checkbox-label">
        <input type="checkbox" name="service[]" value="Gräsklippning" required>
        <label>Gräsklippning</label>
    </div>

    <div class="checkbox-label">
        <input type="checkbox" name="service[]" value="Häckklippning">
        <label>Häckklippning</label>
    </div>

    <div class="checkbox-label">
        <input type="checkbox" name="service[]" value="Trimning">
        <label>Trimning</label>
    </div>

    <label for="date">Önskat datum:</label>
    <input type="date" id="date" name="date" required>

    <label for="time">Önskad tid:</label>
    <input type="time" id="time" name="time" required>

    <label for="additional-info">Ytterligare information:</label>
    <textarea id="additional-info" name="additional_info" rows="4"></textarea>

    <div class="checkbox-label">
        <input type="checkbox" id="consent" name="consent" required>
        <label for="consent">Jag samtycker till behandling av personuppgifter</label>
    </div>

    <button type="submit">Boka</button>
</form>
